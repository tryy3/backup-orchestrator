version: v2
plugins:
  - local: protoc-gen-go
    out: ../server/internal/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../server/internal/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go
    out: ../agent/internal/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../agent/internal/gen
    opt:
      - paths=source_relative
