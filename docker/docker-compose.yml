services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - server-data:/data
    environment:
      BACKUP_DB_PATH: /data/server.db
      BACKUP_HTTP_PORT: "8080"
      BACKUP_GRPC_PORT: "8443"

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    depends_on:
      - server
    volumes:
      - agent-data:/data
      - /home:/mnt/backup/home:ro
      - ./tmp:/tmp
      - restore-data:/mnt/restore
    environment:
      BACKUP_SERVER_URL: server:8443
      BACKUP_AGENT_NAME: demo-agent
      BACKUP_DATA_DIR: /data

volumes:
  server-data:
  agent-data:
  restore-data:
