name: Refresh Release Draft

# Manually triggered to regenerate the draft release body from PR release-note
# blocks. Run this when you are about to publish a release and want richer notes
# than the release-drafter title-only output provides.
#
# The workflow:
#   1. Runs scripts/release-notes.py to collect PR release-note blocks.
#   2. Optionally runs scripts/ai-polish.py to prepend an AI-written summary.
#   3. Finds the current draft release (the one release-drafter maintains).
#   4. Updates the draft body with the generated notes.
#
# After running, open Releases → Edit draft to review and publish.

on:
  workflow_dispatch:
    inputs:
      from_tag:
        description: >
          Collect PRs merged after this tag. Leave blank to auto-detect
          the last published tag.
        required: false
        default: ''
      ai_polish:
        description: >
          Add an AI-generated summary paragraph (GitHub Models / gpt-4o).
          Disable if you want the raw structured list only.
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  refresh-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FROM_TAG="${{ inputs.from_tag }}"
          if [ -n "$FROM_TAG" ]; then
            python3 scripts/release-notes.py --from-tag "$FROM_TAG" --output notes.md
          else
            python3 scripts/release-notes.py --output notes.md
          fi
          echo "--- Structured notes ---"
          cat notes.md

      - name: Add AI summary paragraph
        if: ${{ inputs.ai_polish }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/ai-polish.py --input notes.md --output notes.md
          echo "--- Polished notes ---"
          cat notes.md

      - name: Update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the tag of the current draft release (release-drafter creates one).
          DRAFT_TAG=$(gh release list --json tagName,isDraft \
            | jq -r '.[] | select(.isDraft == true) | .tagName' \
            | head -1)

          if [ -z "$DRAFT_TAG" ]; then
            echo "No draft release found. release-drafter must run at least once first."
            echo "Trigger the 'Release Drafter' workflow or merge a PR to main."
            exit 1
          fi

          echo "Updating draft release: $DRAFT_TAG"
          gh release edit "$DRAFT_TAG" --notes-file notes.md
          echo "Done. Open Releases to review: https://github.com/${{ github.repository }}/releases"
