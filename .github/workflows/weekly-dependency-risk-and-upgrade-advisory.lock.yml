name: "Weekly Dependency Risk and Upgrade Advisory"
"on":
  pull_request:
    paths:
    - "**/go.mod"
    - "**/go.sum"
    - frontend/package.json
    - frontend/package-lock.json
    - frontend/npm-shrinkwrap.json
    - frontend/pnpm-lock.yaml
    - frontend/yarn.lock
  schedule:
  - cron: "23 2 * * 1"
    # Friendly format: weekly (scattered)
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: Agent caller context (used internally by Agentic Workflows).
        required: false
        type: string
      include_trend_delta:
        default: true
        description: When true, compare this run against previous advisory summary.
        required: false
        type: boolean
      max_recommendations:
        default: 10
        description: Maximum ranked recommendations to include.
        required: false
        type: number
      suggest_only:
        default: true
        description: When true, produce suggestions only (no update PRs).
        required: false
        type: boolean

permissions: {}

concurrency:
  group: "gh-aw-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}"
  cancel-in-progress: true

run-name: "Weekly Dependency Risk and Upgrade Advisory"

